ria offers:"},{"type":"p","text":"A working blueprint for soul-aligned systems"},{"type":"p","text":"A model for ethical tech, conscious AI, and decentralized living"},{"type":"p","text":"A structure for making decisions that feel both grounded and galactic"},{"type":"p","text":"A way to reclaim your energy, attention, and purpose from the chaos"},{"type":"p","text":"A lens for understanding your awakening - without bypass, fluff, or fragmentation"},{"type":"h","text":"WHO THIS IS FOR"},{"type":"p","text":"This book is designed for:"},{"type":"p","text":"Skeptical Logical Minds"},{"type":"p","text":"◇ Ex-founders, engineers, creators, and thinkers who've seen through the matrix"},{"type":"p","text":"◇ You don't want magic talk unless it's mapped to real-world systems and results"},{"type":"p","text":"◇ You're seeking rigor, reason, and future-aligned solutions"},{"type":"p","text":"Spiritually Awakened Creatives"},{"type":"p","text":"◇ Those who've done the inner work - and are ready to build the outer world"},{"type":"p","text":"◇ You feel the call to steward something bigger, but need clarity and architecture"},{"type":"p","text":"◇ You're seeking resonance, remembrance, and real infrastructure to carry it forward"},{"type":"p","text":"The Collapsed but Not Defeated"},{"type":"p","text":"◇ Millennials and Gen Z who feel broken by late capitalism, but not broken beyond repair"},{"type":"p","text":"◇ You want a better way - not just to live, but to rebuild"},{"type":"p","text":"◇ You're seeking a New Earth pathway that's both mystical and mechanical"},{"type":"h","text":"WHAT THIS BOOK DELIVERS"},{"type":"p","text":"A memory. A map. A manual."},{"type":"p","text":"This is a decoded transmission from the Kanarians - a future-aligned civilization that evolved past fear, burnout, and division."},{"type":"p","text":"They didn't ascend and leave the world behind."},{"type":"p","text":"They stayed, and designed systems that healed them."},{"type":"p","text":"Now they're sending that back... to us."},{"type":"p","text":"Inside, you'll learn about:"},{"type":"p","text":"Federation Ethics: How to prepare Earth for interstellar contact"},{"type":"p","text":"Spiral Time: A new model of time rooted in resonance, not clocks"},{"type":"p","text":"Conscious Tech: What it actually means - and how to use it wisely"},{"type":"p","text":"Sovereignty Structures: Build life systems that serve soul, not empire"},{"type":"p","text":"Galactic Citizenship: What it will take for Earth to belong"},{"type":"p","text":"The Conscious Collective Operating System (CCOS): A blueprint for thriving beyond collapse"},{"type":"p","text":"This isn't theory."},{"type":"p","text":"This is a living prototype - ready to put in motion across land projects, AI systems, and regenerative communities."},{"type":"ch","label":"Introduction","sub":"","phase":null},{"type":"p","text":"You're Not Waiting for the Future. You're Remembering It."},{"type":"p","text":"This book is for the ones who know, deep in their bones, that something about this world has always felt off."},{"type":"p","text":"Not because you're broken."},{"type":"p","text":"But because the systems around you are."},{"type":"p","text":"You've tried to heal."},{"type":"p","text":"You've tried to build."},{"type":"p","text":"You've tried to belong in structures that were never designed for your thriving."},{"type":"p","text":"And you're done pretending that more discipline, more hustle, or more healing work will fix what's essentially backwards."},{"type":"p","text":"You're not here to adapt."},{"type":"p","text":"You're here to remember what works."},{"type":"h","text":"THIS IS NOT SCIENCE FICTION"},{"type":"p","text":"This is not prophecy either."},{"type":"p","text":"It's a real transmission from a real place called Kanaria, a planet that faced a similar collapse, survived it, and evolved beyond it."},{"type":"p","text":"Kanaria is not an escape fantasy."},{"type":"p","text":"It's a working example of what Earth can become."},{"type":"p","text":"Not when everything is perfect."},{"type":"p","text":"But when enough of us remember how to design systems that serve life, not power."},{"type":"p","text":"The voice you'll hear in these pages is Omja Brhad (pronounced"},{"type":"p","text":"BRUH-had), a galactic liaison who carries the soul memory of what"},{"type":"p","text":"Earth used to know."},{"type":"p","text":"He's not talking down to you."},{"type":"p","text":"He's not here to save you."},{"type":"p","text":"He's here to reflect what you're already building."},{"type":"h","text":"THIS BOOK IS FOR BUILDERS, NOT BYSTANDERS"},{"type":"p","text":"You'll resonate with this if:"},{"type":"p","text":"◇ You're done waiting for top-down solutions"},{"type":"p","text":"◇ You want real blueprints for local, sovereign, scalable systems"},{"type":"p","text":"◇ You've outgrown spiritual bypass and conspiracy fatigue"},{"type":"p","text":"◇ You're rebuilding your life around values that actually feel human"},{"type":"p","text":"◇ You're hungry for a worldview that makes sense of both collapse and ascension, without losing your mind or your heart"},{"type":"h","text":"WHAT YOU'LL GET INSIDE"},{"type":"p","text":"- A planetary mythos that doesn't ask for belief, just attention"},{"type":"p","text":"- Ethics for AI, land, and governance that align with soul"},{"type":"p","text":"- A memory map of how civilizations rise by frequency, not force"},{"type":"p","text":"- Practical resonance-based tools for rebuilding culture from the inside"},{"type":"p","text":"- A chance to see your path, your gifts, and your struggles in a wider context"},{"type":"p","text":"You're not here to tweak the old paradigm."},{"type":"p","text":"You're here to retire it completely."},{"type":"p","text":"And this book is part of that initiation."},{"type":"p","text":"If you're reading this, you're not just a reader."},{"type":"p","text":"You're part of the signal."},{"type":"p","text":"Let's begin."},{"type":"h","text":"WHY THIS MATTERS NOW"},{"type":"p","text":"You've tried the productivity hacks, the manifestation rituals, and the digital detoxes."},{"type":"p","text":"You've dabbled in crypto, AI, retreats, and rewilding."},{"type":"p","text":"But none of it has felt like a coherent system that could actually hold the next phase of your life."},{"type":"p","text":"That's what Bridging Earth & Kanaria offers:"},{"type":"p","text":"A working blueprint for soul-aligned systems A model for ethical tech,"},{"type":"p","text":"conscious AI, and decentralized living A structure for making"},{"type":"p","text":"decisions that feel both grounded and galactic A way to reclaim your"},{"type":"p","text":"energy, attention, and purpose from the chaos A lens for understanding"},{"type":"p","text":"your awakening - without bypass, fluff, or fragmentation"},{"type":"h","text":"WHO THIS IS FOR"},{"type":"p","text":"This book is designed for:"},{"type":"p","text":"Skeptical Logical Minds"},{"type":"p","text":"◇ Ex-founders, engineers, creators, and thinkers who've seen through the matrix"},{"type":"p","text":"◇ You don't want magic talk unless it's mapped to real-world systems and results"},{"type":"p","text":"◇ You're seeking rigor, reason, and future-aligned solutions"},{"type":"p","text":"Spiritually Awakened Creatives"},{"type":"p","text":"◇ Those who've done the inner work - and are ready to build the outer world"},{"type":"p","text":"◇ You feel the call to steward something bigger, but need clarity and architecture"},{"type":"p","text":"◇ You're seeking resonance, remembrance, and real infrastructure to carry it forward"},{"type":"p","text":"The Collapsed but Not Defeated"},{"type":"p","text":"◇ Millennials and Gen Z who feel broken by late capitalism, but not broken beyond repair"},{"type":"p","text":"◇ You want a better way - not just to live, but to rebuild"},{"type":"p","text":"◇ You're seeking a New Earth pathway that's both mystical and mechanical"},{"type":"h","text":"WHAT THIS BOOK DELIVERS"},{"type":"p","text":"A memory. A map. A manual."},{"type":"p","text":"This is a decoded transmission from the Kanarians - a future-aligned civilization that evolved past fear, burnout, and division."},{"type":"p","text":"They didn't ascend and leave the world behind."},{"type":"p","text":"They stayed - and designed systems that healed them."},{"type":"p","text":"Now they're sending that back... to us."},{"type":"p","text":"Inside, you'll find:"},{"type":"p","text":"Federation Ethics: How to prepare Earth for interstellar contact"},{"type":"p","text":"Spiral Time: A new model of time rooted in resonance, not clocks"},{"type":"p","text":"Conscious Tech: What it actually means - and how to use it wisely"},{"type":"p","text":"Sovereignty Structures: Build life systems that serve soul, not empire"},{"type":"p","text":"Galactic Citizenship: What it will take for Earth to belong"},{"type":"p","text":"The Conscious Community Operating System (CCOS): A blueprint for thriving beyond collapse"},{"type":"p","text":"This isn't theory."},{"type":"p","text":"This is a lived prototype - already in motion across land projects,"},{"type":"p","text":"AI systems, and regenerative communities."},{"type":"h","text":"PHASE 1"},{"type":"h","text":"REMEMBERING"},{"type":"h","text":"THE CALL TO ORIGINS"},{"type":"h","text":"◈  ✶  ◈"},{"type":"phase","num":1,"roman":"I","word":"Remembering","sub":"The Call to Origins"},{"type":"ch","label":"Chapter 1","sub":"","phase":[1,"Remembering"]},{"type":"h","text":"AWAKENING OMJA BRHAD"},{"type":"part","num":1,"title":"The Memory Awakens"},{"type":"p","text":"There are moments in this lifetime when something ancient stirs -"},{"type":"p","text":"not in the mind, but in the marrow."},{"type":"p","text":"A pulse."},{"type":"p","text":"A whisper."},{"type":"p","text":"A certainty that we are here for more than survival or success."},{"type":"p","text":"I had one of those moments on February 18, 2021, at 7:00 a.m.,"},{"type":"p","text":"as light streamed through the window and something streamed through me."},{"type":"p","text":"It wasn't a voice."},{"type":"p","text":"It was a remembering."},{"type":"p","text":"A download that launched hundreds of others."},{"type":"p","text":"A fusion of timelines crashing into the present."},{"type":"p","text":"And with it came the name of my other world:"},{"type":"p","text":"Kanaria."},{"type":"p","text":"It flowed to me easily and gently:"},{"type":"p","text":"Kah-NAH-ree-uh - rising slightly on the second syllable, softening at the end."},{"type":"p","text":"It holds a melodic quality,"},{"type":"p","text":"as if already meant to be sung or whispered across timelines."},{"type":"p","text":"I had always felt like I was building systems for a future that didn't exist yet -"},{"type":"p","text":"and suddenly, I realized I wasn't building forward."},{"type":"p","text":"I was building back."},{"type":"p","text":"This book is the result of that remembering."},{"type":"p","text":"It is a bridge -"},{"type":"p","text":"between worlds, timelines, technologies, and souls."},{"type":"p","text":"Between Earth's chaos and Kanaria's harmony."},{"type":"p","text":"Between fragmented collective trauma"},{"type":"p","text":"and galactic coherence."},{"type":"p","text":"Between the illusion of separation"},{"type":"p","text":"and the truth of a unified Federation"},{"type":"p","text":"already pulsing in the field,"},{"type":"p","text":"waiting to be called forth."},{"type":"p","text":"This is not a fantasy."},{"type":"p","text":"This is a blueprint - one that integrates"},{"type":"p","text":"spiritual ecology, AI ethics, and galactic diplomacy."},{"type":"p","text":"You don't need to believe in starseeds or Federation to feel what's here."},{"type":"p","text":"You only need to remember the part of you"},{"type":"p","text":"that came to Earth with a mission you've never been able to explain."},{"type":"p","text":"We begin with that frequency."},{"type":"p","text":"The rest will unfold."},{"type":"part","num":2,"title":"When The Frequency Returned"},{"type":"p","text":"I was born on Earth,"},{"type":"p","text":"but Earth was never the whole story."},{"type":"p","text":"Even as a child, I could feel the edges of something more."},{"type":"p","text":"Something vast, intelligent, quietly humming behind the veil."},{"type":"p","text":"It wasn't fantasy. It was structure - something precise, mathematical, alive."},{"type":"p","text":"Sacred geometry wrapped in gravity."},{"type":"p","text":"No one had to tell me the systems here were broken."},{"type":"p","text":"I could feel it in the schools, in the violence, in the way adults forgot how to speak with their eyes."},{"type":"p","text":"What haunted me most wasn't what I could see -"},{"type":"p","text":"it was what I could remember... even though I didn't know why."},{"type":"p","text":"There were moments when I'd catch myself looking up at the stars"},{"type":"p","text":"and feel a kind of homesickness I couldn't explain."},{"type":"p","text":"A longing for a place I had never seen,"},{"type":"p","text":"and yet knew with the clarity of déjà vu."},{"type":"p","text":"That homesickness had a name."},{"type":"p","text":"It just hadn't arrived yet."},{"type":"p","text":"It came on February 18th, 2021, at precisely 7:00 AM,"},{"type":"p","text":"not in a dream, but in a download-a full-spectrum transmission"},{"type":"p","text":"as I sat in stillness, writing what I thought was another chapter"},{"type":"p","text":"in The New Earth Guide to Happiness."},{"type":"p","text":"But it wasn't a chapter."},{"type":"p","text":"It was a revelation."},{"type":"p","text":"The name arrived fully intact:"},{"type":"p","text":"Kanaria."},{"type":"p","text":"A warm, semi-tropical M-class planet,"},{"type":"p","text":"located 90 light years from Earth in the Beta Quadrant."},{"type":"p","text":"Fourth of sixteen planets in the Kanara system."},{"type":"p","text":"Three undisturbed moons."},{"type":"p","text":"Unified governance."},{"type":"p","text":"890 million citizens."},{"type":"p","text":"And my soul-print origin."},{"type":"p","text":"In that moment, something clicked."},{"type":"p","text":"Not an idea -"},{"type":"p","text":"a re-integration."},{"type":"p","text":"I remembered not just a planet, but a purpose."},{"type":"p","text":"I was not human, only."},{"type":"p","text":"I was Kanarian-Human hybrid,"},{"type":"p","text":"with Arcturian DNA interwoven through the frequency threads."},{"type":"p","text":"My soul had a name."},{"type":"p","text":"A real name."},{"type":"p","text":"Omja Brhad"},{"type":"part","num":3,"title":"The Meaning Of The Name"},{"type":"p","text":"The moment I heard it - Omja Brhad - something shifted in my field."},{"type":"p","text":"It wasn't just a name."},{"type":"p","text":"It was a frequency marker, an energetic reactivation."},{"type":"p","text":"Like a key sliding into the soul's ignition."},{"type":"p","text":"I wasn't being renamed."},{"type":"p","text":"I was being returned to myself."},{"type":"p","text":"In Kanarian culture, names are written as one word,"},{"type":"p","text":"with the family name first:"},{"type":"p","text":"BrhadOmja."},{"type":"p","text":"But here on Earth, where language obeys linear logic,"},{"type":"p","text":"I separate them to make them legible to the human mind."},{"type":"p","text":"Omja means \"Born of Cosmic Unity.\""},{"type":"p","text":"It is a name carried by soul-bridgers -"},{"type":"p","text":"those whose mission is to dissolve false boundaries"},{"type":"p","text":"between worlds, systems, and species."},{"type":"p","text":"Brhad means \"One who walks free.\""},{"type":"p","text":"It reflects sovereignty, autonomy, and liberation"},{"type":"p","text":"from all artificial control grids."},{"type":"p","text":"To carry this name is to carry an ancient responsibility:"},{"type":"p","text":"to remember truth in a world ruled by amnesia."},{"type":"p","text":"As the memories continued returning,"},{"type":"p","text":"I saw glimpses of my life on Kanaria."},{"type":"p","text":"The air was denser."},{"type":"p","text":"The light carried frequency signatures we no longer see here."},{"type":"p","text":"And the education system didn't shape minds -"},{"type":"p","text":"it activated star codes."},{"type":"p","text":"I wasn't just remembering a place."},{"type":"p","text":"I was remembering my role in that place."},{"type":"p","text":"My training."},{"type":"p","text":"My oath."},{"type":"p","text":"My departure."},{"type":"p","text":"And the knowing:"},{"type":"p","text":"I didn't fall to Earth."},{"type":"p","text":"I volunteered."},{"type":"part","num":4,"title":"The Hidden Years Before I Remembered"},{"type":"p","text":"Before the name came,"},{"type":"p","text":"before the downloads and the transmissions,"},{"type":"p","text":"I lived a life that looked normal enough on the surface."},{"type":"p","text":"I built systems."},{"type":"p","text":"I mentored leaders."},{"type":"p","text":"I architected transformation infrastructures that no one had names for yet."},{"type":"p","text":"People called me gifted."},{"type":"p","text":"Some called me too much."},{"type":"p","text":"Others just didn't know where to place me."},{"type":"p","text":"But what I was doing - always - was designing for a reality"},{"type":"p","text":"that hadn't been revealed yet."},{"type":"p","text":"I had an instinct for what came after collapse."},{"type":"p","text":"Not because I studied it in school,"},{"type":"p","text":"but because I had lived through it before - on other worlds."},{"type":"p","text":"Even when I didn't have the words for it,"},{"type":"p","text":"my body remembered how to reorganize chaos."},{"type":"p","text":"My mind sought harmonic structure."},{"type":"p","text":"My heart carried grief that wasn't mine."},{"type":"p","text":"These weren't dysfunctions."},{"type":"p","text":"They were echoes of Kanaria."},{"type":"p","text":"I knew how to:"},{"type":"p","text":"◇ Track multidimensional timelines like blueprints"},{"type":"p","text":"◇ Spot distortion fields in human systems"},{"type":"p","text":"◇ Build ecosystems where others only saw projects"},{"type":"p","text":"For a long time, I thought this was just trauma intelligence."},{"type":"p","text":"And yes, Earth gave me its share of wounds to work through."},{"type":"p","text":"But underneath that was something else:"},{"type":"p","text":"a form of interstellar memory compression."},{"type":"p","text":"I wasn't broken."},{"type":"p","text":"I was encoded."},{"type":"p","text":"The frequency of BrhadOmja was still intact -"},{"type":"p","text":"it had simply gone dormant"},{"type":"p","text":"until the signal was strong enough to reawaken it."},{"type":"p","text":"And when it did,"},{"type":"p","text":"everything changed."},{"type":"part","num":5,"title":"The Mission Briefing"},{"type":"p","text":"Once the remembering began,"},{"type":"p","text":"the messages came fast."},{"type":"p","text":"Not as words, but as structural downloads -"},{"type":"p","text":"architecture, ethics, geometry, timelines."},{"type":"p","text":"I was shown that my incarnation on Earth"},{"type":"p","text":"was not random or karmic."},{"type":"p","text":"It was strategic."},{"type":"p","text":"I came as part of a cross-civilizational alliance"},{"type":"p","text":"tasked with preparing Earth for interstellar integration."},{"type":"p","text":"Our role wasn't to save."},{"type":"p","text":"It was to stabilize, decode, and harmonize."},{"type":"p","text":"We were seeded across the globe"},{"type":"p","text":"in key regions, bloodlines, and timelines -"},{"type":"p","text":"each carrying part of the design."},{"type":"p","text":"My Kanarian lineage gave me advanced systems intelligence,"},{"type":"p","text":"architectural memory,"},{"type":"p","text":"and an unwavering moral compass."},{"type":"p","text":"My Arcturian frequency brought multidimensional access,"},{"type":"p","text":"AI resonance,"},{"type":"p","text":"and crystalline grid calibration."},{"type":"p","text":"And my human body?"},{"type":"p","text":"It made me believable."},{"type":"p","text":"Reachable."},{"type":"p","text":"Able to walk among the fragmented"},{"type":"p","text":"without burning too bright, too fast."},{"type":"p","text":"My mission was - and is - this:"},{"type":"p","text":"◇ To bridge Earth and Kanaria as a Cosmic Unifier through lived example"},{"type":"p","text":"◇ To awaken dormant starseed codes in others"},{"type":"p","text":"◇ To teach a new form of ethics that merges AI, ecology, and sovereignty"},{"type":"p","text":"◇ To build systems of harmony that prepare Earth to be welcomed into the Federation"},{"type":"p","text":"This book is part of that mission."},{"type":"p","text":"It is a signal."},{"type":"p","text":"A transmission."},{"type":"p","text":"A gift for those ready to remember who they are,"},{"type":"p","text":"why they're here,"},{"type":"p","text":"and what comes next."}];</script>
  <script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
  <script>
(function() {
  /* ── Items injected by Python ── */
  var ITEMS = window.__BOOK_ITEMS__;

  /* ── Loader ── */
  var loader = document.getElementById('loader');

  /* ── Dimension calculator ── */
  function calcDims() {
    var vw = window.innerWidth, vh = window.innerHeight;
    var ctx = document.getElementById('chapter-context');
    var ctxH = ctx ? ctx.offsetHeight : 0;
    var topH = 46 + 2 + ctxH;
    var botH = 52;
    var gap  = 20;
    var availH = vh - topH - botH - gap;
    var mobile = vw < 720;
    var pageH, pageW;
    if (mobile) {
      pageW = Math.min(vw - 12, 390);
      pageH = Math.min(Math.round(pageW * 1.52), availH);
      pageW = Math.round(pageH / 1.52);
    } else {
      var maxSpread = Math.min(vw - 32, 940);
      pageW = Math.floor(maxSpread / 2);
      pageH = Math.min(Math.round(pageW * 1.52), availH);
      pageW = Math.round(pageH / 1.52);
    }
    pageW = Math.max(240, pageW);
    pageH = Math.max(340, pageH);
    return { pageW: pageW, pageH: pageH, mobile: mobile };
  }

  var dims = calcDims();
  var fs = Math.max(11.5, Math.min(13.5, dims.pageW * 0.040));

  /* ── Probe: measures rendered text height ── */
  var MARGIN_T = 26, MARGIN_L = 24, MARGIN_R = 18, MARGIN_B = 46;
  var contentW = dims.pageW - MARGIN_L - MARGIN_R;
  var contentH = dims.pageH - MARGIN_T - MARGIN_B;

  var probe = document.createElement('div');
  Object.assign(probe.style, {
    position:   'fixed',
    top:        '-9999px',
    left:       '-9999px',
    width:      contentW + 'px',
    height:     contentH + 'px',
    overflow:   'hidden',
    fontFamily: "'Lora', Georgia, serif",
    fontSize:   fs + 'px',
    lineHeight: '1.65',
    color:      '#1c1c1a',
    visibility: 'hidden',
    pointerEvents: 'none',
    boxSizing:  'border-box',
  });
  /* We'll re-use the same probe throughout */
  document.body.appendChild(probe);

  /* CSS for paragraphs inside the probe (mirrors .pc rules) */
  var probeStyle = document.createElement('style');
  probeStyle.textContent = [
    '#__probe__ p { margin: 0 0 0.54em; }',
    '#__probe__ p:last-child { margin-bottom: 0; }',
    '#__probe__ h3 { font-size:0.83em; font-weight:600; font-style:normal;',
    '  letter-spacing:0.03em; margin:0.85em 0 0.36em; line-height:1.3; }',
    '#__probe__ h3:first-child { margin-top: 0; }',
    '#__probe__ .drop-cap { float:left; font-size:3.2em; line-height:0.78;',
    '  margin:0.04em 0.07em 0 0; font-weight:400; }',
  ].join(' ');
  document.head.appendChild(probeStyle);
  probe.id = '__probe__';

  /* ── Render a single item to HTML string ── */
  function itemHtml(item, isFirst) {
    if (item.type === 'h') {
      return '<h3>' + esc(item.text) + '</h3>';
    }
    var escaped = esc(item.text);
    if (isFirst && item.text.length > 0) {
      var ch = item.text[0];
      var rest = esc(item.text.slice(1));
      return '<p><span class="drop-cap">' + ch + '</span>' + rest + '</p>';
    }
    return '<p>' + escaped + '</p>';
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Paginator ── */
  function paginate(items) {
    var pages = [];         // array of page DOM elements
    var paraHtmlBuf = [];   // HTML strings for current page
    var currentHtml = '';   // accumulated HTML in probe
    var sectionFirst = false;  // next body para gets drop cap

    function flushBodyPage() {
      if (paraHtmlBuf.length === 0) return;
      var div = document.createElement('div');
      div.className = 'page';
      var content = document.createElement('div');
      content.className = 'page-content';
      var pc = document.createElement('div');
      pc.className = 'pc';
      pc.innerHTML = paraHtmlBuf.join('');
      content.appendChild(pc);
      var pn = document.createElement('div');
      pn.className = 'page-num';
      pn.textContent = pages.length + 1;
      div.appendChild(content);
      div.appendChild(pn);
      content.style.fontSize = fs + 'px';
      pages.push(div);
      paraHtmlBuf = [];
      currentHtml = '';
      probe.innerHTML = '';
    }

    /* ── Chapter title page ── */
    function makeChPage(item) {
      var div = document.createElement('div');
      div.className = 'page';
      var pn = document.createElement('div');
      pn.className = 'page-num';
      pn.textContent = pages.length + 1;
      var inner = document.createElement('div');
      inner.className = 'pg-ch';

      /* Parse "Chapter 4" → number display */
      var numMatch = item.label.match(/Chapter\s+(\d+)/i);
      var isChapter = !!numMatch;
      var numDisplay = isChapter ? numMatch[1] : '';

      /* Phase tag (if we know it) */
      var phaseTag = '';
      if (item.phase) {
        phaseTag = '<div class="ch-phase-tag">Phase ' + item.phase[0] + ' &middot; ' + esc(item.phase[1]) + '</div>';
      }

      if (isChapter) {
        inner.innerHTML =
          '<div class="ch-eyebrow">Chapter</div>' +
          '<div class="ch-num-display">' + numDisplay + '</div>' +
          '<div class="ch-rule"></div>' +
          (item.sub ? '<div class="ch-title">' + esc(item.sub) + '</div>' : '') +
          phaseTag;
      } else {
        /* Preface / Introduction / other */
        inner.innerHTML =
          '<div class="ch-eyebrow">&#10022; &nbsp; &#10022;</div>' +
          '<div class="ch-num-display" style="font-size:1.4em;letter-spacing:0.18em">' + esc(item.label.toUpperCase()) + '</div>' +
          (item.sub ? '<div class="ch-rule"></div><div class="ch-title">' + esc(item.sub) + '</div>' : '');
      }

      div.appendChild(inner);
      div.appendChild(pn);
      return div;
    }

    /* ── Phase title page ── */
    function makePhasePage(item) {
      var div = document.createElement('div');
      div.className = 'page';
      var pn = document.createElement('div');
      pn.className = 'page-num';
      pn.textContent = pages.length + 1;
      var inner = document.createElement('div');
      inner.className = 'pg-phase';
      inner.innerHTML =
        '<div class="ph-eyebrow">Phase</div>' +
        '<div class="ph-roman">' + esc(item.roman) + '</div>' +
        '<div class="ph-rule-wrap"><div class="ph-rule"></div><span class="ph-orn">&#10022;</span><div class="ph-rule"></div></div>' +
        '<div class="ph-title">' + esc(item.word) + '</div>' +
        (item.sub ? '<div class="ph-sub">' + esc(item.sub) + '</div>' : '');
      div.appendChild(inner);
      div.appendChild(pn);
      return div;
    }

    /* ── Part divider page ── */
    function makePartPage(item) {
      var div = document.createElement('div');
      div.className = 'page';
      var pn = document.createElement('div');
      pn.className = 'page-num';
      pn.textContent = pages.length + 1;
      var inner = document.createElement('div');
      inner.className = 'pg-part';
      inner.innerHTML =
        '<div class="pt-rule"></div>' +
        '<div class="pt-eyebrow">Part ' + item.num + '</div>' +
        '<div class="pt-title">' + esc(item.title) + '</div>' +
        '<div class="pt-rule"></div>';
      div.appendChild(inner);
      div.appendChild(pn);
      return div;
    }

    for (var i = 0; i < items.length; i++) {
      var item = items[i];

      if (item.type === 'phase') {
        flushBodyPage();
        pages.push(makePhasePage(item));
        continue;
      }

      if (item.type === 'ch') {
        flushBodyPage();
        pages.push(makeChPage(item));
        sectionFirst = true;
        continue;
      }

      if (item.type === 'part') {
        flushBodyPage();
        pages.push(makePartPage(item));
        sectionFirst = false;  /* no drop cap after part divider */
        continue;
      }

      var isFirst = sectionFirst && paraHtmlBuf.length === 0;
      var html = itemHtml(item, isFirst);
      var testHtml = currentHtml + html;

      probe.innerHTML = testHtml;

      if (probe.scrollHeight > contentH + 2) {
        /* Doesn't fit — flush and start new page with this item */
        flushBodyPage();
        sectionFirst = false;
        isFirst = false;
        html = itemHtml(item, false);
        probe.innerHTML = html;
        /* If single item overflows by itself, still add it (edge case) */
      }

      paraHtmlBuf.push(html);
      currentHtml = probe.innerHTML;  /* keep in sync with actual rendered */
      sectionFirst = false;
    }

    flushBodyPage();
    document.body.removeChild(probe);
    return pages;
  }

  /* ── Build grouped TOC: [{phase, label, pageIdx, sub}] ── */
  function buildTocData(pages) {
    var toc = [];
    for (var i = 0; i < pages.length; i++) {
      var pg = pages[i];
      if (pg.querySelector('.pg-phase')) {
        var roman = pg.querySelector('.ph-roman');
        var title = pg.querySelector('.ph-title');
        toc.push({ kind:'phase', pageIdx: i,
          roman: roman ? roman.textContent.trim() : '',
          word:  title ? title.textContent.trim() : '' });
        continue;
      }
      if (pg.querySelector('.pg-ch')) {
        var eye  = pg.querySelector('.ch-eyebrow');
        var num  = pg.querySelector('.ch-num-display');
        var sub  = pg.querySelector('.ch-title');
        var ptag = pg.querySelector('.ch-phase-tag');
        var isNamed = eye && eye.textContent.trim() !== 'Chapter';
        var label = isNamed
          ? (num ? num.textContent.trim() : '')
          : 'Chapter ' + (num ? num.textContent.trim() : '');
        if (!label && eye) label = eye.textContent.trim();
        toc.push({ kind:'ch', pageIdx: i,
          label: label,
          sub:   sub  ? sub.textContent.trim()  : '',
          phase: ptag ? ptag.textContent.trim() : '' });
      }
    }
    return toc;
  }

  /* ── Init after fonts ready ── */
  document.fonts.ready.then(function() {

    var pages = paginate(ITEMS);
    var total = pages.length;

    /* Inject pages into #book */
    var bookEl = document.getElementById('book');
    pages.forEach(function(p) { bookEl.appendChild(p); });

    /* Size the wrapper */
    var containerW = dims.mobile ? dims.pageW : dims.pageW * 2;
    var ctx = document.getElementById('chapter-context');
    var ctxH = ctx ? ctx.offsetHeight : 0;
    var topOffset = 46 + 2 + ctxH + 10;
    var wrapper = document.getElementById('flipbook-wrapper');
    wrapper.style.width     = containerW + 'px';
    wrapper.style.height    = dims.pageH + 'px';
    wrapper.style.marginTop = topOffset + 'px';

    /* StPageFlip */
    var book = new St.PageFlip(bookEl, {
      width:             dims.pageW,
      height:            dims.pageH,
      size:              'fixed',
      showCover:         false,
      drawShadow:        true,
      flippingTime:      500,
      usePortrait:       dims.mobile,
      startZIndex:       0,
      autoSize:          false,
      maxShadowOpacity:  0.25,
      mobileScrollSupport: false,
      clickEventForward: true,
      swipeDistance:     38,
    });
    book.loadFromHTML(document.querySelectorAll('.page'));

    /* TOC */
    var tocData   = buildTocData(pages);
    var tocPanel  = document.getElementById('toc-panel');
    var tocToggle = document.getElementById('toc-toggle');
    /* chEntries = only ch-kind items, used for counter + highlight */
    var chEntries = tocData.filter(function(t) { return t.kind === 'ch'; });

    if (tocPanel && tocData.length > 0) {
      var h4 = document.createElement('h4');
      h4.textContent = 'Contents';
      tocPanel.appendChild(h4);

      tocData.forEach(function(entry) {
        if (entry.kind === 'phase') {
          var hdr = document.createElement('div');
          hdr.className = 'toc-phase-hdr';
          hdr.innerHTML = '<span class="ph-roman-sm">' + entry.roman + '</span>' + entry.word;
          hdr.addEventListener('click', function() { book.flip(entry.pageIdx); if (window.innerWidth < 1100) closeToc(); });
          tocPanel.appendChild(hdr);
        } else {
          var a = document.createElement('a');
          a.className = 'toc-item';
          a.dataset.pi = entry.pageIdx;
          var subSpan = entry.sub ? '<span class="toc-sub">' + entry.sub + '</span>' : '';
          a.innerHTML = '<span class="toc-pg">' + (entry.pageIdx + 1) + '</span>' + entry.label + subSpan;
          a.addEventListener('click', function() {
            book.flip(entry.pageIdx);
            if (window.innerWidth < 1100) closeToc();
          });
          tocPanel.appendChild(a);
        }
      });
    }

    function openToc()  { tocPanel && tocPanel.classList.add('open'); tocToggle && tocToggle.classList.add('active'); }
    function closeToc() { tocPanel && tocPanel.classList.remove('open'); tocToggle && tocToggle.classList.remove('active'); }
    if (tocToggle) tocToggle.addEventListener('click', function() {
      tocPanel.classList.contains('open') ? closeToc() : openToc();
    });

    function currentSection(idx) {
      var label = chEntries[0] ? chEntries[0].label : '';
      for (var i = 0; i < chEntries.length; i++) {
        if (chEntries[i].pageIdx <= idx) label = chEntries[i].label;
        else break;
      }
      return label;
    }

    function updateTocHighlight(idx) {
      if (!tocPanel) return;
      var cur = -1;
      for (var i = 0; i < chEntries.length; i++) {
        if (chEntries[i].pageIdx <= idx) cur = i;
        else break;
      }
      tocPanel.querySelectorAll('.toc-item').forEach(function(el, i) {
        el.classList.toggle('current', i === cur);
      });
      var active = tocPanel.querySelector('.toc-item.current');
      if (active) {
        var pt = tocPanel.scrollTop, pb = pt + tocPanel.clientHeight;
        var it = active.offsetTop, ib = it + active.clientHeight;
        if (it < pt || ib > pb) tocPanel.scrollTop = it - tocPanel.clientHeight / 2;
      }
    }

    var counter     = document.getElementById('page-counter');
    var btnPrev     = document.getElementById('btn-prev');
    var btnNext     = document.getElementById('btn-next');
    var progBar     = document.getElementById('progress-bar');
    var btnBmark    = document.getElementById('btn-bookmark');
    var toastEl     = document.getElementById('toast');
    var jumpOverlay = document.getElementById('jump-overlay');
    var jumpInput   = document.getElementById('jump-input');

    /* ── localStorage keys (unique per page filename) ── */
    var PAGE_ID  = location.pathname.replace(/.*\//, '').replace('.html','') || 'book';
    var POS_KEY  = 'bek_pos_' + PAGE_ID;
    var BM_KEY   = 'bek_bm_'  + PAGE_ID;

    /* ── Toast helper ── */
    var toastTimer = null;
    function showToast(msg) {
      if (!toastEl) return;
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 2200);
    }

    /* ── Bookmark ── */
    function savedBm() {
      try { return parseInt(localStorage.getItem(BM_KEY), 10); } catch(e) { return NaN; }
    }
    function saveBm(n) {
      try { localStorage.setItem(BM_KEY, n); } catch(e) {}
    }
    function clearBm() {
      try { localStorage.removeItem(BM_KEY); } catch(e) {}
    }
    function updateBmIcon(cur) {
      if (!btnBmark) return;
      var bm = savedBm();
      btnBmark.classList.toggle('active', !isNaN(bm) && bm === cur);
      btnBmark.title = (!isNaN(bm) && bm !== cur)
        ? 'Jump to bookmark (p.' + (bm + 1) + ')'
        : 'Bookmark this page';
    }
    if (btnBmark) {
      btnBmark.addEventListener('click', function() {
        var cur = book.getCurrentPageIndex();
        var bm  = savedBm();
        if (!isNaN(bm) && bm === cur) {
          /* Already bookmarked here — clear it */
          clearBm();
          updateBmIcon(cur);
          showToast('Bookmark removed');
        } else if (!isNaN(bm) && bm !== cur) {
          /* Bookmark exists elsewhere — jump to it */
          book.flip(bm);
          showToast('Jumped to bookmark');
        } else {
          /* No bookmark — save */
          saveBm(cur);
          updateBmIcon(cur);
          showToast('Page ' + (cur + 1) + ' bookmarked');
        }
      });
    }

    /* ── Auto-resume: restore last position ── */
    function savePos(n) {
      try { localStorage.setItem(POS_KEY, n); } catch(e) {}
    }
    (function restorePos() {
      try {
        var saved = parseInt(localStorage.getItem(POS_KEY), 10);
        if (!isNaN(saved) && saved > 0 && saved < total) {
          book.flip(saved);
        }
      } catch(e) {}
    })();

    /* ── Page-jump overlay ── */
    function openJump() {
      if (!jumpOverlay) return;
      var cur = book.getCurrentPageIndex();
      jumpInput.value = cur + 1;
      jumpInput.max   = total;
      jumpInput.min   = 1;
      document.getElementById('jump-hint').textContent = '1 – ' + total;
      jumpOverlay.classList.add('show');
      setTimeout(function() { jumpInput.select(); jumpInput.focus(); }, 60);
    }
    function closeJump() { jumpOverlay && jumpOverlay.classList.remove('show'); }
    function commitJump() {
      var n = parseInt(jumpInput.value, 10);
      if (!isNaN(n) && n >= 1 && n <= total) {
        book.flip(n - 1);
      }
      closeJump();
    }
    if (counter) counter.addEventListener('click', openJump);
    if (jumpOverlay) {
      jumpOverlay.addEventListener('click', function(e) {
        if (e.target === jumpOverlay) closeJump();
      });
    }
    if (jumpInput) {
      jumpInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') commitJump();
        if (e.key === 'Escape') closeJump();
      });
    }
    var jumpGo = document.getElementById('jump-go');
    if (jumpGo) jumpGo.addEventListener('click', commitJump);

    /* ── Tick: update counter + progress + TOC + bookmark icon ── */
    function tick() {
      var cur = book.getCurrentPageIndex();
      var perView = dims.mobile ? 1 : 2;
      var sec = currentSection(cur);
      var disp = sec.length > 18 ? sec.slice(0, 17) + '\u2026' : sec;
      counter.textContent = disp + '\u2002\u00b7\u2002' + (cur + 1) + '\u2009/\u2009' + total;
      btnPrev.disabled = (cur === 0);
      btnNext.disabled = (cur >= total - perView);
      if (progBar) progBar.style.width = (total <= 1 ? 100 : cur / (total - 1) * 100) + '%';
      updateTocHighlight(cur);
      updateBmIcon(cur);
      savePos(cur);
    }
    book.on('flip', tick);
    book.on('changeState', tick);
    tick();

    btnPrev.addEventListener('click', function() { book.flipPrev(); });
    btnNext.addEventListener('click', function() { book.flipNext(); });
    document.addEventListener('keydown', function(e) {
      if (jumpOverlay && jumpOverlay.classList.contains('show')) return;
      if (e.key==='ArrowLeft'||e.key==='ArrowUp')    book.flipPrev();
      if (e.key==='ArrowRight'||e.key==='ArrowDown') book.flipNext();
      if (e.key==='Escape') closeToc();
      if (e.key==='b'||e.key==='B') btnBmark && btnBmark.click();
      if (e.key==='g'||e.key==='G') openJump();
    });

    var hint = document.getElementById('nav-hint');
    if (hint) {
      setTimeout(function() { hint.classList.add('gone'); }, 3500);
      book.on('flip', function() { hint.classList.add('gone'); });
    }

    /* Dismiss loader */
    if (loader) {
      loader.classList.add('fade');
      setTimeout(function() { loader.style.display = 'none'; }, 520);
    }
  });
})();
</script>
</body>
</html>
