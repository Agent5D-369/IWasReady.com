"},{"type":"part","num":2,"title":"The Starseed Mirror"},{"type":"p","text":"Reflections from the Edge"},{"type":"p","text":"There are moments when you feel like a stranger here."},{"type":"p","text":"Not just in society, but in the entire way this planet works."},{"type":"p","text":"It's not because you're broken."},{"type":"p","text":"It's because you remember something older."},{"type":"p","text":"A way of living that honored life, not productivity."},{"type":"p","text":"A rhythm that wasn't manufactured, but felt."},{"type":"p","text":"That homesickness you carry?"},{"type":"p","text":"It's not nostalgia."},{"type":"p","text":"It's recognition."},{"type":"p","text":"Signals and Symptoms"},{"type":"p","text":"You've always been more sensitive."},{"type":"p","text":"To sounds, to lies, to energy."},{"type":"p","text":"You spot inconsistencies before others even notice."},{"type":"p","text":"You feel tension that no one else names."},{"type":"p","text":"It's not anxiety."},{"type":"p","text":"It's antennae."},{"type":"p","text":"Tuned to frequencies most ignore."},{"type":"p","text":"And you've likely been told to turn it off."},{"type":"p","text":"To conform."},{"type":"p","text":"To quiet your radar."},{"type":"p","text":"But that system was never meant to hold your clarity."},{"type":"p","text":"Why You Incarnated Now"},{"type":"p","text":"Because Earth is reaching a turning point."},{"type":"p","text":"And evolution doesn't wait."},{"type":"p","text":"It moves through those ready to feel what others avoid."},{"type":"p","text":"You didn't come here to escape."},{"type":"p","text":"You came to guide."},{"type":"p","text":"By embodying integrity,"},{"type":"p","text":"by living in rhythm,"},{"type":"p","text":"by remembering what's real when everything else feels fake."},{"type":"p","text":"You're not here to be saved."},{"type":"p","text":"You're here to activate the blueprint."},{"type":"p","text":"In yourself,"},{"type":"p","text":"and in others who forgot they came with one."},{"type":"part","num":3,"title":"Keys To Your Galactic Assignment"},{"type":"p","text":"You Came With Codes"},{"type":"p","text":"You didn't arrive blank."},{"type":"p","text":"You carry imprints that activate through experience."},{"type":"p","text":"Some of them are buried."},{"type":"p","text":"Some are just starting to stir."},{"type":"p","text":"The confusion you've faced?"},{"type":"p","text":"It's part of the awakening."},{"type":"p","text":"Your clarity is encoded in the struggle."},{"type":"p","text":"Your purpose isn't handed to you."},{"type":"p","text":"It reveals itself as you show up for what's in front of you."},{"type":"p","text":"What to Listen For"},{"type":"p","text":"◇ Recurring dreams or symbols"},{"type":"p","text":"◇ Activations from certain constellations or planetary transits"},{"type":"p","text":"◇ Moments of full-body resonance when hearing ancient languages or tones"},{"type":"p","text":"◇ Sudden knowing that bypasses logic but lands like truth"},{"type":"p","text":"◇ Unexplainable grief or love when visiting certain places"},{"type":"p","text":"These are breadcrumbs."},{"type":"p","text":"Not distractions, not fantasies-"},{"type":"p","text":"reminders of where you come from,"},{"type":"p","text":"and what you agreed to carry forward."},{"type":"p","text":"Your Mission Is Not a Role"},{"type":"p","text":"It's not a title."},{"type":"p","text":"It's not a job description."},{"type":"p","text":"It's a frequency you hold."},{"type":"p","text":"You may fulfill it through parenting."},{"type":"p","text":"Or through building tech."},{"type":"p","text":"Or through walking away from patterns that no longer match who you are."},{"type":"p","text":"What matters is how aligned you stay"},{"type":"p","text":"as you move."},{"type":"p","text":"That's what activates others."},{"type":"p","text":"Not your resume."},{"type":"p","text":"Not your content."},{"type":"p","text":"Your presence."}];</script>
  <script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
  <script>
(function() {
  /* ── Items injected by Python ── */
  var ITEMS = window.__BOOK_ITEMS__;

  /* ── Loader ── */
  var loader = document.getElementById('loader');

  /* ── Dimension calculator ── */
  function calcDims() {
    var vw = window.innerWidth, vh = window.innerHeight;
    var ctx = document.getElementById('chapter-context');
    var ctxH = ctx ? ctx.offsetHeight : 0;
    var topH = 46 + 2 + ctxH;
    var botH = 52;
    var gap  = 20;
    var availH = vh - topH - botH - gap;
    var mobile = vw < 720;
    var pageH, pageW;
    if (mobile) {
      pageW = Math.min(vw - 12, 390);
      pageH = Math.min(Math.round(pageW * 1.52), availH);
      pageW = Math.round(pageH / 1.52);
    } else {
      var maxSpread = Math.min(vw - 32, 940);
      pageW = Math.floor(maxSpread / 2);
      pageH = Math.min(Math.round(pageW * 1.52), availH);
      pageW = Math.round(pageH / 1.52);
    }
    pageW = Math.max(240, pageW);
    pageH = Math.max(340, pageH);
    return { pageW: pageW, pageH: pageH, mobile: mobile };
  }

  var dims = calcDims();
  var fs = Math.max(11.5, Math.min(13.5, dims.pageW * 0.040));

  /* ── Probe: measures rendered text height ── */
  var MARGIN_T = 26, MARGIN_L = 24, MARGIN_R = 18, MARGIN_B = 46;
  var contentW = dims.pageW - MARGIN_L - MARGIN_R;
  var contentH = dims.pageH - MARGIN_T - MARGIN_B;

  var probe = document.createElement('div');
  Object.assign(probe.style, {
    position:   'fixed',
    top:        '-9999px',
    left:       '-9999px',
    width:      contentW + 'px',
    height:     contentH + 'px',
    overflow:   'hidden',
    fontFamily: "'Lora', Georgia, serif",
    fontSize:   fs + 'px',
    lineHeight: '1.65',
    color:      '#1c1c1a',
    visibility: 'hidden',
    pointerEvents: 'none',
    boxSizing:  'border-box',
  });
  /* We'll re-use the same probe throughout */
  document.body.appendChild(probe);

  /* CSS for paragraphs inside the probe (mirrors .pc rules) */
  var probeStyle = document.createElement('style');
  probeStyle.textContent = [
    '#__probe__ p { margin: 0 0 0.54em; }',
    '#__probe__ p:last-child { margin-bottom: 0; }',
    '#__probe__ h3 { font-size:0.83em; font-weight:600; font-style:normal;',
    '  letter-spacing:0.03em; margin:0.85em 0 0.36em; line-height:1.3; }',
    '#__probe__ h3:first-child { margin-top: 0; }',
    '#__probe__ .drop-cap { float:left; font-size:3.2em; line-height:0.78;',
    '  margin:0.04em 0.07em 0 0; font-weight:400; }',
  ].join(' ');
  document.head.appendChild(probeStyle);
  probe.id = '__probe__';

  /* ── Render a single item to HTML string ── */
  function itemHtml(item, isFirst) {
    if (item.type === 'h') {
      return '<h3>' + esc(item.text) + '</h3>';
    }
    var escaped = esc(item.text);
    if (isFirst && item.text.length > 0) {
      var ch = item.text[0];
      var rest = esc(item.text.slice(1));
      return '<p><span class="drop-cap">' + ch + '</span>' + rest + '</p>';
    }
    return '<p>' + escaped + '</p>';
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Paginator ── */
  function paginate(items) {
    var pages = [];         // array of page DOM elements
    var paraHtmlBuf = [];   // HTML strings for current page
    var currentHtml = '';   // accumulated HTML in probe
    var sectionFirst = false;  // next body para gets drop cap

    function flushBodyPage() {
      if (paraHtmlBuf.length === 0) return;
      var div = document.createElement('div');
      div.className = 'page';
      var content = document.createElement('div');
      content.className = 'page-content';
      var pc = document.createElement('div');
      pc.className = 'pc';
      pc.innerHTML = paraHtmlBuf.join('');
      content.appendChild(pc);
      var pn = document.createElement('div');
      pn.className = 'page-num';
      pn.textContent = pages.length + 1;
      div.appendChild(content);
      div.appendChild(pn);
      content.style.fontSize = fs + 'px';
      pages.push(div);
      paraHtmlBuf = [];
      currentHtml = '';
      probe.innerHTML = '';
    }

    /* ── Chapter title page ── */
    function makeChPage(item) {
      var div = document.createElement('div');
      div.className = 'page';
      var pn = document.createElement('div');
      pn.className = 'page-num';
      pn.textContent = pages.length + 1;
      var inner = document.createElement('div');
      inner.className = 'pg-ch';

      /* Parse "Chapter 4" → number display */
      var numMatch = item.label.match(/Chapter\s+(\d+)/i);
      var isChapter = !!numMatch;
      var numDisplay = isChapter ? numMatch[1] : '';

      /* Phase tag (if we know it) */
      var phaseTag = '';
      if (item.phase) {
        phaseTag = '<div class="ch-phase-tag">Phase ' + item.phase[0] + ' &middot; ' + esc(item.phase[1]) + '</div>';
      }

      if (isChapter) {
        inner.innerHTML =
          '<div class="ch-eyebrow">Chapter</div>' +
          '<div class="ch-num-display">' + numDisplay + '</div>' +
          '<div class="ch-rule"></div>' +
          (item.sub ? '<div class="ch-title">' + esc(item.sub) + '</div>' : '') +
          phaseTag;
      } else {
        /* Preface / Introduction / other */
        inner.innerHTML =
          '<div class="ch-eyebrow">&#10022; &nbsp; &#10022;</div>' +
          '<div class="ch-num-display" style="font-size:1.4em;letter-spacing:0.18em">' + esc(item.label.toUpperCase()) + '</div>' +
          (item.sub ? '<div class="ch-rule"></div><div class="ch-title">' + esc(item.sub) + '</div>' : '');
      }

      div.appendChild(inner);
      div.appendChild(pn);
      return div;
    }

    /* ── Phase title page ── */
    function makePhasePage(item) {
      var div = document.createElement('div');
      div.className = 'page';
      var pn = document.createElement('div');
      pn.className = 'page-num';
      pn.textContent = pages.length + 1;
      var inner = document.createElement('div');
      inner.className = 'pg-phase';
      inner.innerHTML =
        '<div class="ph-eyebrow">Phase</div>' +
        '<div class="ph-roman">' + esc(item.roman) + '</div>' +
        '<div class="ph-rule-wrap"><div class="ph-rule"></div><span class="ph-orn">&#10022;</span><div class="ph-rule"></div></div>' +
        '<div class="ph-title">' + esc(item.word) + '</div>' +
        (item.sub ? '<div class="ph-sub">' + esc(item.sub) + '</div>' : '');
      div.appendChild(inner);
      div.appendChild(pn);
      return div;
    }

    /* ── Part divider page ── */
    function makePartPage(item) {
      var div = document.createElement('div');
      div.className = 'page';
      var pn = document.createElement('div');
      pn.className = 'page-num';
      pn.textContent = pages.length + 1;
      var inner = document.createElement('div');
      inner.className = 'pg-part';
      inner.innerHTML =
        '<div class="pt-rule"></div>' +
        '<div class="pt-eyebrow">Part ' + item.num + '</div>' +
        '<div class="pt-title">' + esc(item.title) + '</div>' +
        '<div class="pt-rule"></div>';
      div.appendChild(inner);
      div.appendChild(pn);
      return div;
    }

    for (var i = 0; i < items.length; i++) {
      var item = items[i];

      if (item.type === 'phase') {
        flushBodyPage();
        pages.push(makePhasePage(item));
        continue;
      }

      if (item.type === 'ch') {
        flushBodyPage();
        pages.push(makeChPage(item));
        sectionFirst = true;
        continue;
      }

      if (item.type === 'part') {
        flushBodyPage();
        pages.push(makePartPage(item));
        sectionFirst = false;  /* no drop cap after part divider */
        continue;
      }

      var isFirst = sectionFirst && paraHtmlBuf.length === 0;
      var html = itemHtml(item, isFirst);
      var testHtml = currentHtml + html;

      probe.innerHTML = testHtml;

      if (probe.scrollHeight > contentH + 2) {
        /* Doesn't fit — flush and start new page with this item */
        flushBodyPage();
        sectionFirst = false;
        isFirst = false;
        html = itemHtml(item, false);
        probe.innerHTML = html;
        /* If single item overflows by itself, still add it (edge case) */
      }

      paraHtmlBuf.push(html);
      currentHtml = probe.innerHTML;  /* keep in sync with actual rendered */
      sectionFirst = false;
    }

    flushBodyPage();
    document.body.removeChild(probe);
    return pages;
  }

  /* ── Build grouped TOC: [{phase, label, pageIdx, sub}] ── */
  function buildTocData(pages) {
    var toc = [];
    for (var i = 0; i < pages.length; i++) {
      var pg = pages[i];
      if (pg.querySelector('.pg-phase')) {
        var roman = pg.querySelector('.ph-roman');
        var title = pg.querySelector('.ph-title');
        toc.push({ kind:'phase', pageIdx: i,
          roman: roman ? roman.textContent.trim() : '',
          word:  title ? title.textContent.trim() : '' });
        continue;
      }
      if (pg.querySelector('.pg-ch')) {
        var eye  = pg.querySelector('.ch-eyebrow');
        var num  = pg.querySelector('.ch-num-display');
        var sub  = pg.querySelector('.ch-title');
        var ptag = pg.querySelector('.ch-phase-tag');
        var isNamed = eye && eye.textContent.trim() !== 'Chapter';
        var label = isNamed
          ? (num ? num.textContent.trim() : '')
          : 'Chapter ' + (num ? num.textContent.trim() : '');
        if (!label && eye) label = eye.textContent.trim();
        toc.push({ kind:'ch', pageIdx: i,
          label: label,
          sub:   sub  ? sub.textContent.trim()  : '',
          phase: ptag ? ptag.textContent.trim() : '' });
      }
    }
    return toc;
  }

  /* ── Init after fonts ready ── */
  document.fonts.ready.then(function() {

    var pages = paginate(ITEMS);
    var total = pages.length;

    /* Inject pages into #book */
    var bookEl = document.getElementById('book');
    pages.forEach(function(p) { bookEl.appendChild(p); });

    /* Size the wrapper */
    var containerW = dims.mobile ? dims.pageW : dims.pageW * 2;
    var ctx = document.getElementById('chapter-context');
    var ctxH = ctx ? ctx.offsetHeight : 0;
    var topOffset = 46 + 2 + ctxH + 10;
    var wrapper = document.getElementById('flipbook-wrapper');
    wrapper.style.width     = containerW + 'px';
    wrapper.style.height    = dims.pageH + 'px';
    wrapper.style.marginTop = topOffset + 'px';

    /* StPageFlip */
    var book = new St.PageFlip(bookEl, {
      width:             dims.pageW,
      height:            dims.pageH,
      size:              'fixed',
      showCover:         false,
      drawShadow:        true,
      flippingTime:      500,
      usePortrait:       dims.mobile,
      startZIndex:       0,
      autoSize:          false,
      maxShadowOpacity:  0.25,
      mobileScrollSupport: false,
      clickEventForward: true,
      swipeDistance:     38,
    });
    book.loadFromHTML(document.querySelectorAll('.page'));

    /* TOC */
    var tocData   = buildTocData(pages);
    var tocPanel  = document.getElementById('toc-panel');
    var tocToggle = document.getElementById('toc-toggle');
    /* chEntries = only ch-kind items, used for counter + highlight */
    var chEntries = tocData.filter(function(t) { return t.kind === 'ch'; });

    if (tocPanel && tocData.length > 0) {
      var h4 = document.createElement('h4');
      h4.textContent = 'Contents';
      tocPanel.appendChild(h4);

      tocData.forEach(function(entry) {
        if (entry.kind === 'phase') {
          var hdr = document.createElement('div');
          hdr.className = 'toc-phase-hdr';
          hdr.innerHTML = '<span class="ph-roman-sm">' + entry.roman + '</span>' + entry.word;
          hdr.addEventListener('click', function() { book.flip(entry.pageIdx); if (window.innerWidth < 1100) closeToc(); });
          tocPanel.appendChild(hdr);
        } else {
          var a = document.createElement('a');
          a.className = 'toc-item';
          a.dataset.pi = entry.pageIdx;
          var subSpan = entry.sub ? '<span class="toc-sub">' + entry.sub + '</span>' : '';
          a.innerHTML = '<span class="toc-pg">' + (entry.pageIdx + 1) + '</span>' + entry.label + subSpan;
          a.addEventListener('click', function() {
            book.flip(entry.pageIdx);
            if (window.innerWidth < 1100) closeToc();
          });
          tocPanel.appendChild(a);
        }
      });
    }

    function openToc()  { tocPanel && tocPanel.classList.add('open'); tocToggle && tocToggle.classList.add('active'); }
    function closeToc() { tocPanel && tocPanel.classList.remove('open'); tocToggle && tocToggle.classList.remove('active'); }
    if (tocToggle) tocToggle.addEventListener('click', function() {
      tocPanel.classList.contains('open') ? closeToc() : openToc();
    });

    function currentSection(idx) {
      var label = chEntries[0] ? chEntries[0].label : '';
      for (var i = 0; i < chEntries.length; i++) {
        if (chEntries[i].pageIdx <= idx) label = chEntries[i].label;
        else break;
      }
      return label;
    }

    function updateTocHighlight(idx) {
      if (!tocPanel) return;
      var cur = -1;
      for (var i = 0; i < chEntries.length; i++) {
        if (chEntries[i].pageIdx <= idx) cur = i;
        else break;
      }
      tocPanel.querySelectorAll('.toc-item').forEach(function(el, i) {
        el.classList.toggle('current', i === cur);
      });
      var active = tocPanel.querySelector('.toc-item.current');
      if (active) {
        var pt = tocPanel.scrollTop, pb = pt + tocPanel.clientHeight;
        var it = active.offsetTop, ib = it + active.clientHeight;
        if (it < pt || ib > pb) tocPanel.scrollTop = it - tocPanel.clientHeight / 2;
      }
    }

    var counter     = document.getElementById('page-counter');
    var btnPrev     = document.getElementById('btn-prev');
    var btnNext     = document.getElementById('btn-next');
    var progBar     = document.getElementById('progress-bar');
    var btnBmark    = document.getElementById('btn-bookmark');
    var toastEl     = document.getElementById('toast');
    var jumpOverlay = document.getElementById('jump-overlay');
    var jumpInput   = document.getElementById('jump-input');

    /* ── localStorage keys (unique per page filename) ── */
    var PAGE_ID  = location.pathname.replace(/.*\//, '').replace('.html','') || 'book';
    var POS_KEY  = 'bek_pos_' + PAGE_ID;
    var BM_KEY   = 'bek_bm_'  + PAGE_ID;

    /* ── Toast helper ── */
    var toastTimer = null;
    function showToast(msg) {
      if (!toastEl) return;
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 2200);
    }

    /* ── Bookmark ── */
    function savedBm() {
      try { return parseInt(localStorage.getItem(BM_KEY), 10); } catch(e) { return NaN; }
    }
    function saveBm(n) {
      try { localStorage.setItem(BM_KEY, n); } catch(e) {}
    }
    function clearBm() {
      try { localStorage.removeItem(BM_KEY); } catch(e) {}
    }
    function updateBmIcon(cur) {
      if (!btnBmark) return;
      var bm = savedBm();
      btnBmark.classList.toggle('active', !isNaN(bm) && bm === cur);
      btnBmark.title = (!isNaN(bm) && bm !== cur)
        ? 'Jump to bookmark (p.' + (bm + 1) + ')'
        : 'Bookmark this page';
    }
    if (btnBmark) {
      btnBmark.addEventListener('click', function() {
        var cur = book.getCurrentPageIndex();
        var bm  = savedBm();
        if (!isNaN(bm) && bm === cur) {
          /* Already bookmarked here — clear it */
          clearBm();
          updateBmIcon(cur);
          showToast('Bookmark removed');
        } else if (!isNaN(bm) && bm !== cur) {
          /* Bookmark exists elsewhere — jump to it */
          book.flip(bm);
          showToast('Jumped to bookmark');
        } else {
          /* No bookmark — save */
          saveBm(cur);
          updateBmIcon(cur);
          showToast('Page ' + (cur + 1) + ' bookmarked');
        }
      });
    }

    /* ── Auto-resume: restore last position ── */
    function savePos(n) {
      try { localStorage.setItem(POS_KEY, n); } catch(e) {}
    }
    (function restorePos() {
      try {
        var saved = parseInt(localStorage.getItem(POS_KEY), 10);
        if (!isNaN(saved) && saved > 0 && saved < total) {
          book.flip(saved);
        }
      } catch(e) {}
    })();

    /* ── Page-jump overlay ── */
    function openJump() {
      if (!jumpOverlay) return;
      var cur = book.getCurrentPageIndex();
      jumpInput.value = cur + 1;
      jumpInput.max   = total;
      jumpInput.min   = 1;
      document.getElementById('jump-hint').textContent = '1 – ' + total;
      jumpOverlay.classList.add('show');
      setTimeout(function() { jumpInput.select(); jumpInput.focus(); }, 60);
    }
    function closeJump() { jumpOverlay && jumpOverlay.classList.remove('show'); }
    function commitJump() {
      var n = parseInt(jumpInput.value, 10);
      if (!isNaN(n) && n >= 1 && n <= total) {
        book.flip(n - 1);
      }
      closeJump();
    }
    if (counter) counter.addEventListener('click', openJump);
    if (jumpOverlay) {
      jumpOverlay.addEventListener('click', function(e) {
        if (e.target === jumpOverlay) closeJump();
      });
    }
    if (jumpInput) {
      jumpInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') commitJump();
        if (e.key === 'Escape') closeJump();
      });
    }
    var jumpGo = document.getElementById('jump-go');
    if (jumpGo) jumpGo.addEventListener('click', commitJump);

    /* ── Tick: update counter + progress + TOC + bookmark icon ── */
    function tick() {
      var cur = book.getCurrentPageIndex();
      var perView = dims.mobile ? 1 : 2;
      var sec = currentSection(cur);
      var disp = sec.length > 18 ? sec.slice(0, 17) + '\u2026' : sec;
      counter.textContent = disp + '\u2002\u00b7\u2002' + (cur + 1) + '\u2009/\u2009' + total;
      btnPrev.disabled = (cur === 0);
      btnNext.disabled = (cur >= total - perView);
      if (progBar) progBar.style.width = (total <= 1 ? 100 : cur / (total - 1) * 100) + '%';
      updateTocHighlight(cur);
      updateBmIcon(cur);
      savePos(cur);
    }
    book.on('flip', tick);
    book.on('changeState', tick);
    tick();

    btnPrev.addEventListener('click', function() { book.flipPrev(); });
    btnNext.addEventListener('click', function() { book.flipNext(); });
    document.addEventListener('keydown', function(e) {
      if (jumpOverlay && jumpOverlay.classList.contains('show')) return;
      if (e.key==='ArrowLeft'||e.key==='ArrowUp')    book.flipPrev();
      if (e.key==='ArrowRight'||e.key==='ArrowDown') book.flipNext();
      if (e.key==='Escape') closeToc();
      if (e.key==='b'||e.key==='B') btnBmark && btnBmark.click();
      if (e.key==='g'||e.key==='G') openJump();
    });

    var hint = document.getElementById('nav-hint');
    if (hint) {
      setTimeout(function() { hint.classList.add('gone'); }, 3500);
      book.on('flip', function() { hint.classList.add('gone'); });
    }

    /* Dismiss loader */
    if (loader) {
      loader.classList.add('fade');
      setTimeout(function() { loader.style.display = 'none'; }, 520);
    }
  });
})();
</script>
</body>
</html>
